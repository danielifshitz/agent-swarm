name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  portable-shell:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: sh -n install.sh core/swarm tests/test.sh
      - name: Run end-to-end tests
        run: sh tests/test.sh
